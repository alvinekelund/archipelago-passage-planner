    <script>
      // Browsers suspend requestAnimationFrame in hidden tabs, which freezes
      // MapLibre's style/render loop. Fall back to a timer so the map keeps
      // working when the tab is backgrounded (or embedded headlessly).
      (() => {
        const nativeRaf = window.requestAnimationFrame.bind(window);
        const nativeCancel = window.cancelAnimationFrame.bind(window);
        const fallbacks = new Map();
        window.requestAnimationFrame = (cb) => {
          let done = false;
          const fire = (t) => {
            if (done) return;
            done = true;
            fallbacks.delete(id);
            cb(t);
          };
          const id = nativeRaf(fire);
          fallbacks.set(id, setTimeout(() => fire(performance.now()), 60));
          return id;
        };
        window.cancelAnimationFrame = (id) => {
          nativeCancel(id);
          clearTimeout(fallbacks.get(id));
          fallbacks.delete(id);
        };
      })();
    </script>
